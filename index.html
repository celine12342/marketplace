<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maison — Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cream: #f5f0e8;
      --ivory: #faf8f3;
      --gold: #b8975a;
      --gold-light: #d4b07a;
      --charcoal: #1a1814;
      --warm-grey: #7a756d;
      --border: rgba(184,151,90,0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--ivory);
      color: var(--charcoal);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.6;
    }

    /* Header */
    header {
      text-align: center;
      padding: 72px 40px 48px;
      position: relative;
    }

    header::after {
      content: '';
      display: block;
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 28px auto 0;
    }

    .eyebrow {
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.1s;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(42px, 6vw, 76px);
      font-weight: 300;
      letter-spacing: 0.04em;
      line-height: 1.05;
      color: var(--charcoal);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.25s;
    }

    h1 em {
      font-style: italic;
      color: var(--gold);
    }

    .subtitle {
      font-size: 12px;
      letter-spacing: 0.2em;
      color: var(--warm-grey);
      margin-top: 14px;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }

    /* Enter Product Button */
    .header-actions {
      display: flex;
      justify-content: center;
      margin-top: 28px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.5s;
    }

    .btn-enter-product {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: none;
      border: 1px solid var(--border);
      color: var(--warm-grey);
      font-family: 'Jost', sans-serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 12px 28px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.3s, color 0.3s, background 0.3s;
      position: relative;
      overflow: hidden;
    }

    .btn-enter-product::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
      z-index: 0;
    }

    .btn-enter-product:hover::before {
      transform: scaleX(1);
    }

    .btn-enter-product:hover {
      border-color: var(--gold);
      color: var(--charcoal);
    }

    .btn-enter-product span,
    .btn-enter-product svg {
      position: relative;
      z-index: 1;
    }

    .btn-enter-product svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      transition: transform 0.3s ease;
    }

    .btn-enter-product:hover svg {
      transform: translateX(2px);
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding: 0 40px 48px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.6s;
    }

    .filter-btn {
      background: none;
      border: none;
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--warm-grey);
      cursor: pointer;
      padding: 6px 0;
      position: relative;
      transition: color 0.3s;
    }

    .filter-btn::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 1px;
      background: var(--gold);
      transition: width 0.3s ease;
    }

    .filter-btn:hover, .filter-btn.active {
      color: var(--gold);
    }

    .filter-btn.active::after,
    .filter-btn:hover::after {
      width: 100%;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2px 80px;
    }

    /* Card */
    .card {
      background: var(--ivory);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards;
    }

    .card:nth-child(1) { animation-delay: 0.15s; }
    .card:nth-child(2) { animation-delay: 0.25s; }
    .card:nth-child(3) { animation-delay: 0.35s; }
    .card:nth-child(4) { animation-delay: 0.45s; }
    .card:nth-child(5) { animation-delay: 0.55s; }
    .card:nth-child(6) { animation-delay: 0.65s; }
    .card:nth-child(7) { animation-delay: 0.75s; }
    .card:nth-child(8) { animation-delay: 0.85s; }

    /* Image container */
    .card-img {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      overflow: hidden;
      background: var(--cream);
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.5s ease;
      filter: brightness(0.97) contrast(1.02);
    }

    .card:hover .card-img img {
      transform: scale(1.06);
      filter: brightness(1) contrast(1.03);
    }

    /* Gold shimmer on hover */
    .card-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(184,151,90,0.12) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .card:hover .card-img::after { opacity: 1; }

    /* Quick action */
    .card-action {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s ease;
      white-space: nowrap;
    }

    .card:hover .card-action {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .btn-add {
      background: var(--charcoal);
      color: var(--cream);
      border: none;
      font-family: 'Jost', sans-serif;
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 10px 24px;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
    }

    .btn-add:hover {
      background: var(--gold);
      color: var(--charcoal);
    }

    /* Badge */
    .badge {
      position: absolute;
      top: 16px;
      left: 16px;
      font-family: 'Jost', sans-serif;
      font-size: 8px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 5px 10px;
      z-index: 2;
    }

    .badge-new { background: var(--charcoal); color: var(--cream); }
    .badge-sale { background: var(--gold); color: var(--charcoal); }

    /* Card info */
    .card-info {
      padding: 20px 24px 28px;
      border-top: 1px solid var(--border);
    }

    .card-category {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--charcoal);
      margin-bottom: 4px;
      line-height: 1.25;
    }

    .card-desc {
      font-size: 11px;
      color: var(--warm-grey);
      letter-spacing: 0.05em;
      margin-bottom: 14px;
      line-height: 1.6;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      color: var(--charcoal);
      letter-spacing: 0.03em;
    }

    .price-original {
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      color: var(--warm-grey);
      text-decoration: line-through;
      margin-right: 8px;
    }

    .wishlist-btn {
      background: none;
      border: 1px solid var(--border);
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s;
    }

    .wishlist-btn:hover {
      border-color: var(--gold);
      background: rgba(184,151,90,0.08);
    }

    .wishlist-btn svg {
      width: 14px;
      height: 14px;
      stroke: var(--warm-grey);
      fill: none;
      transition: stroke 0.3s;
    }

    .wishlist-btn:hover svg { stroke: var(--gold); }

    /* Featured card (spans 2 cols) */
    .card-featured {
      grid-column: span 2;
    }

    .card-featured .card-img {
      aspect-ratio: 16/9;
    }

    @media (max-width: 640px) {
      .card-featured { grid-column: span 1; }
      .card-featured .card-img { aspect-ratio: 3/4; }
      .filter-bar { gap: 18px; flex-wrap: wrap; }
    }

    /* Loading state */
    .loading-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 40px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.3s;
    }

    .loading-state p {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--warm-grey);
    }

    .loading-dots {
      display: inline-flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .loading-dots span {
      width: 4px;
      height: 4px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse 1.4s ease infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 48px 40px;
      border-top: 1px solid var(--border);
    }

    .footer-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .footer-sub {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--warm-grey);
      margin-top: 10px;
      text-transform: uppercase;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">New Collection — 2025</p>
  <h1>The <em>Art</em> of Living</h1>
  <p class="subtitle">Curated for those who seek the extraordinary</p>
  <div class="header-actions">
    <a href="add-product.html" class="btn-enter-product">
      <span>Enter Product</span>
      <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>
  </div>
</header>

<nav class="filter-bar">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="Fragrance">Fragrance</button>
  <button class="filter-btn" data-filter="Skincare">Skincare</button>
  <button class="filter-btn" data-filter="Accessories">Accessories</button>
  <button class="filter-btn" data-filter="Home">Home</button>
</nav>

<main class="grid" id="product-grid">
  <div class="loading-state">
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <p>Loading collection</p>
  </div>
</main>

<footer>
  <div class="footer-logo">Maison</div>
  <p class="footer-sub">Est. 1921 &nbsp;·&nbsp; Paris &nbsp;·&nbsp; New York &nbsp;·&nbsp; Tokyo</p>
</footer>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────────
  // Replace with your Google Sheets published CSV URL
  // File → Share → Publish to web → CSV
  const CSV_URL = "PASTE_YOUR_GOOGLE_SHEET_CSV_URL_HERE";

  // Static fallback products (used when no CSV URL is configured)
  const STATIC_PRODUCTS = [
    {
      name: "Nuit Dorée Eau de Parfum",
      category: "Fragrance",
      desc: "A golden dusk captured in a bottle — amber, rose, and vetiver entwined.",
      price: "$285",
      originalPrice: "",
      badge: "new",
      image: "https://images.unsplash.com/photo-1541643600914-78b084683702?w=900&q=80",
      featured: "true"
    },
    {
      name: "Velvet Rose Serum",
      category: "Skincare",
      desc: "Rare Bulgarian rose extract, 24-hour radiance.",
      price: "$165",
      originalPrice: "",
      badge: "",
      image: "https://images.unsplash.com/photo-1598440947619-2c35fc9aa908?w=600&q=80",
      featured: ""
    },
    {
      name: "Saffron Oud Candle",
      category: "Home",
      desc: "Hand-poured soy wax with 60-hour burn time.",
      price: "$88",
      originalPrice: "$120",
      badge: "sale",
      image: "https://images.unsplash.com/photo-1617220577836-6f78c56ede30?w=600&q=80",
      featured: ""
    },
    {
      name: "Obsidian Silk Scarf",
      category: "Accessories",
      desc: "100% Mulberry silk, hand-printed in Como, Italy.",
      price: "$340",
      originalPrice: "",
      badge: "new",
      image: "https://images.unsplash.com/photo-1611085583191-a3b181a88400?w=600&q=80",
      featured: ""
    },
    {
      name: "Gold Leaf Face Oil",
      category: "Skincare",
      desc: "24-karat gold and argan oil for luminous skin.",
      price: "$210",
      originalPrice: "",
      badge: "",
      image: "https://images.unsplash.com/photo-1526045612212-70caf35c14df?w=600&q=80",
      featured: ""
    },
    {
      name: "Marble Letter Opener",
      category: "Accessories",
      desc: "Carrara marble with 18k gold-plated blade.",
      price: "$195",
      originalPrice: "",
      badge: "",
      image: "https://images.unsplash.com/photo-1481277542470-605612bd2d61?w=600&q=80",
      featured: ""
    },
    {
      name: "Coco Noir - Chanel",
      category: "Home",
      desc: "Very Expensive",
      price: "$500",
      originalPrice: "",
      badge: "new",
      image: "https://i.etsystatic.com/16073018/r/il/1288c8/7338669705/il_300x300.7338669705_7n7n.jpg",
      featured: ""
    }
  ];

  // ── CSV PARSER ──────────────────────────────────────────────────────────────
  function parseCSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, '').toLowerCase());
    return lines.slice(1).map(line => {
      const values = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        if (line[i] === '"') {
          inQuotes = !inQuotes;
        } else if (line[i] === ',' && !inQuotes) {
          values.push(current.trim());
          current = '';
        } else {
          current += line[i];
        }
      }
      values.push(current.trim());
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (values[i] || '').replace(/^"|"$/g, ''); });
      return obj;
    }).filter(row => row.name && row.name.trim() !== '');
  }

  // ── CARD RENDERER ───────────────────────────────────────────────────────────
  function createCardHTML(product, index) {
    const isFeatured = product.featured && product.featured.toString().toLowerCase() === 'true';
    const badge = product.badge ? product.badge.toLowerCase() : '';
    const badgeHTML = badge
      ? `<span class="badge badge-${badge}">${badge.charAt(0).toUpperCase() + badge.slice(1)}</span>`
      : '';
    const priceHTML = product.originalprice && product.originalprice.trim()
      ? `<span class="price-original">${product.originalprice}</span>${product.price}`
      : product.price;
    const imgSrc = product.image || 'https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=600&q=80';
    const delayMap = [0.15, 0.25, 0.35, 0.45, 0.55, 0.65, 0.75, 0.85];
    const delay = delayMap[index % delayMap.length];

    return `
      <article class="card${isFeatured ? ' card-featured' : ''}" data-category="${product.category || ''}" style="animation-delay:${delay}s">
        <div class="card-img">
          ${badgeHTML}
          <img src="${imgSrc}" alt="${product.name}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=600&q=80'"/>
          <div class="card-action"><button class="btn-add">Add to Cart</button></div>
        </div>
        <div class="card-info">
          <p class="card-category">${product.category || ''}</p>
          <h2 class="card-name">${product.name}</h2>
          <p class="card-desc">${product.desc || ''}</p>
          <div class="card-footer">
            <span class="card-price">${priceHTML}</span>
            <button class="wishlist-btn" aria-label="Add to wishlist">
              <svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            </button>
          </div>
        </div>
      </article>`;
  }

  // ── RENDER PRODUCTS ─────────────────────────────────────────────────────────
  let allProducts = [];
  let currentFilter = 'all';

  function renderProducts(products) {
    const grid = document.getElementById('product-grid');
    if (!products || products.length === 0) {
      grid.innerHTML = `
        <div class="loading-state">
          <p>No products found in this collection.</p>
        </div>`;
      return;
    }
    grid.innerHTML = products.map((p, i) => createCardHTML(p, i)).join('');
    bindCardEvents();
  }

  function applyFilter(filter) {
    currentFilter = filter;
    const filtered = filter === 'all'
      ? allProducts
      : allProducts.filter(p => (p.category || '').toLowerCase() === filter.toLowerCase());
    renderProducts(filtered);
  }

  // ── BIND EVENTS ─────────────────────────────────────────────────────────────
  function bindCardEvents() {
    document.querySelectorAll('.wishlist-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const svg = this.querySelector('svg');
        const filled = svg.style.fill === 'rgb(184, 151, 90)';
        svg.style.fill = filled ? 'none' : 'rgb(184, 151, 90)';
        svg.style.stroke = filled ? '' : 'rgb(184, 151, 90)';
      });
    });
  }

  // ── FILTER BAR ───────────────────────────────────────────────────────────────
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      applyFilter(this.dataset.filter);
    });
  });

  // ── LOAD DATA ────────────────────────────────────────────────────────────────
  async function loadProducts() {
    if (!CSV_URL || CSV_URL === "PASTE_YOUR_GOOGLE_SHEET_CSV_URL_HERE") {
      // Use static fallback products
      allProducts = STATIC_PRODUCTS;
      renderProducts(allProducts);
      return;
    }

    try {
      const res = await fetch(CSV_URL);
      if (!res.ok) throw new Error('Network error');
      const text = await res.text();
      const parsed = parseCSV(text);
      allProducts = parsed.length > 0 ? parsed : STATIC_PRODUCTS;
    } catch (err) {
      console.warn('CSV load failed, using static products:', err);
      allProducts = STATIC_PRODUCTS;
    }
    renderProducts(allProducts);
  }

  loadProducts();
</script>
</body>
</html>
